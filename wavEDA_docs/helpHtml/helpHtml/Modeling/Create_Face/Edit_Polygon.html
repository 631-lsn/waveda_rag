	<p>
	编辑多边形面时，若该面为非正多边形，可进入此窗口设置多边形面。窗口左侧表格为多边形顶点坐标，
      按连接顺序依次排列。窗口右侧画布中会根据左侧坐标实时显示边形面。
	</p>
                <img src=./images/Edit_Polygon_1.png>  
  	<p>坐标编辑支持一键清空，默认行数为50行，若坐标多于50个，可点击添加坐标加入行。
      支持导入txt文件设置多边形坐标，同时也支持将该坐标列表导出为txt文件，以便下次使用。</p>
  	<p>多边形设置时，连接线条不允许交叉，如下图所示，左图为正确多边形，右图为出现交叉线的多边形。
当然，用户可随时点击验证多边形按钮，验证坐标的正确性。</p>
