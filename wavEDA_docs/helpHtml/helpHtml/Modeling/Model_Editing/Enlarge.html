    <p>  此功能可以将二维几何面保留原有结构扩大。
    <p>
        <h3>激活扩大功能</h3>
    <p>
        先选择二维几何，可以是一个简单的轮廓（如矩形、圆形、多边形等），也可以是经过布尔操作后的几何组合。

        切换到选面模式，选择要扩大的面。选中主菜单栏“建模”->“形状”->“扩大”<img src=./images/Enlarge_3.png style="min-width: 5px; max-width: 20px; " />图标。
        

        <h3>距离</h3>
    <p>
        原有面与扩大后的面的距离。
    <p>
        <img src=./images/Enlarge_4.png style="min-width: 300px; max-width: 500px; " />

    </p>

    <h3>保留面上的缝隙</h3>
    若勾选此选项，则扩大后面上的缝隙会被保留。若取消勾选，则扩大后为一个完整的面。
    以正方形布尔减圆形的几何组合为例，如下图所示。
