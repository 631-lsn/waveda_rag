    <h3 id="Exchange">切割面</h3>
    <p>给定“平面上的一点”以及“平面法向”确定切割平面。在选点模式下选中两点，点击“选点”按钮即可。选中的第一个点为平面上的一点，两点组成平面法向向量。</p>
