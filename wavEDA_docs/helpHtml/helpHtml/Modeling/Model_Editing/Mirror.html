    <h3 id="Exchange">镜像平面</h3>
    <p>
        给定镜像平面以及镜像法向可确定镜像属性，”镜像平面上的一点“以及”平面法向“以及可通过选点确定，
        在选点模式下选中两点，点击“选点”按钮即可。选中的第一个点为平面上的一点，两点组成平面法向向量。
    </p>
