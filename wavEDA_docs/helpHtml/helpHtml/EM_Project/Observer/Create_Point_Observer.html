	<h2 id="创建点接收器">创建点接收器</h2>
    <p>右键点击工程树上的接收器，可创建点接收器，可通过输入点坐标或阵列创建进行点接收器创建，同时支持导入.txt文件进行点接收器创建。</p>
    <img src=./images/Create_Point_Observer_1.png>
    <p>点击之后，进入创建点接收器界面。</p> 
    <img src=./images/Create_Point_Observer_2.png>
  
    <h2 id="输入接收器坐标">输入接收器坐标</h2>
    <p>在接收器位置框中输入接收器x、y、z轴坐标，点击创建即可建立点接收器，同时创建多个点默认分为一个组，再次创建将会另分为一个组；此外，还可通过选点模式下选择选点进行设置或导入坐标数据设置。</p>
  
    <h2 id="阵列创建">阵列创建</h2>
    <p>点击阵列创建选项，即可进入阵列创建点接收器设置选项，具体内容可参考<a href=../../Modeling/Model_Editing/Array_Copy.html>阵列创建</a>。</p>
