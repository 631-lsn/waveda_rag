	<p>
     沿路径扫描是用线段生成面的快捷方法。右击程序树上的线点击沿路径扫描可以打开该页面，当程序树内有两条及以上的非闭合直线时可以使用该功能。
  

	</p>

	<h2 id="原始线">原始线</h2>
	<p>沿路径扫描得到的几何，需要两条线用于生成面，原始线的起点和终点将作为生成面的其中一条边。</p>
  
	<h2 id="路径线">路径线</h2>
	<p>沿路径扫描得到的几何，需要两条线用于生成面，路径线将作为生成面的另外一条边。</p>
  


    <!-- 提示：这个是图片插入的代码，你想插入图片只需要把图片放到同一个目录下，比方说我有image.png这个图片 -->

	<h2 id="其他">其他</h2>
	<p>勾选删除原物体后，则沿路径扫描功能只生成得到的面。不勾选该功能，软件将保留原有的线段，并生成新的面。勾选删除路径后，则沿路径扫描功能只生成得到的面。不勾选该功能，软件将保留原有的路径，并生成新的面</p>
